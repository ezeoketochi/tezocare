name: Flutter Mobile CI/CD

on:
  push:
    branches: [main]
    paths:
      - "tezocare_mobile/**" # Only trigger if mobile files change

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tezocare_mobile # Focus context on the mobile subdirectory

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java Environment
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          # flutter-version: '3.22.0' # Optional: Lock down your exact working framework version

      - name: Install Dependencies
        run: flutter pub get

      - name: Code Quality Verification (Linting)
        run: flutter analyze

      - name: Run Unit Tests
        run: flutter test

      - name: Build Android Release Binary
        run: flutter build apk --release # Generates app-release.apk

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: tezocare_mobile/build/app/outputs/flutter-apk/app-release.apk

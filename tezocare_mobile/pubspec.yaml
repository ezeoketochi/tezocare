name: tezocare_mobile
description: "TezoCare - Veterinary clinic management mobile application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^7.7.0

  # HTTP Client
  dio: ^5.4.3+1

  # Secure Storage (for JWT tokens)
  flutter_secure_storage: ^9.2.2

  # Navigation
  go_router: ^14.2.7

  # Functional Programming (Either, Option for error handling)
  dartz: ^0.10.1

  # Firebase (for FCM push notifications - aligns with backend)
  firebase_core: ^3.4.1
  firebase_messaging: ^15.1.3

  # Internet Connectivity Check
  internet_connection_checker: ^3.0.1

  # JSON Serialization
  json_annotation: ^4.9.0

  # Intl (date formatting)
  intl: ^0.19.0

  # Loading indicators
  shimmer: ^3.0.0

  # Responsive Design
  flutter_screenutil: ^5.9.3

  # Fonts
  google_fonts: ^6.2.1

  # Animations
  flutter_animate: ^4.5.2

  # SVG Support
  flutter_svg: ^2.0.16

  # Toast Notifications
  toastification: ^2.3.0

  # Charts
  fl_chart: ^0.69.0

  # PDF Export (aligns with backend export feature)
  printing: ^5.13.1
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
